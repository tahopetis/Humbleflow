# Humbleflow CI Configuration
# Runs mechanical enforcement tools on every PR.
# Blocks merge on boundary violations. Warns on other issues.
#
# This is a reference configuration. Adapt to your CI provider
# (GitHub Actions, GitLab CI, CircleCI, etc.).

name: Humbleflow Enforcement

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (Boundaries + Golden Principles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run boundary lint
        run: python3 tools/lint-boundaries.py
      - name: Run golden principle lint
        run: python3 tools/lint-golden.py

  quality:
    name: Quality Grade Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update quality grades
        run: python3 tools/quality-grade.py
      - name: Check for grade degradation
        run: |
          # If overall grade drops, fail the job (non-blocking, just flag it)
          if grep -q 'Overall grade: \*\*[C-F]\*\*' docs/quality.md; then
            echo "::warning::Quality grade is C or below. Consider garbage collection."
          fi

  garden:
    name: Doc Gardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for stale docs
        run: python3 tools/doc-gardener.py
        continue-on-error: true  # Non-blocking — flag it, don't block merge

  validate-plans:
    name: Plan Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate execution plans
        run: python3 tools/validate-plan.py
        continue-on-error: true  # Non-blocking — flag it, don't block merge

  # Final gate — only boundary violations block merge
  merge-gate:
    name: Merge Gate
    needs: [lint, quality, garden, validate-plans]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check merge gate
        run: |
          if [ "${{ needs.lint.result }}" == "failure" ]; then
            echo "❌ Boundary or golden principle violations found. Merge blocked."
            exit 1
          fi
          echo "✓ All blocking checks passed."
